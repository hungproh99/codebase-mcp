name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codebase-mcp-linux-x86_64
            binary: codebase-mcp
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: codebase-mcp-linux-aarch64
            binary: codebase-mcp
            use_cross: true

          - os: macos-13
            target: x86_64-apple-darwin
            artifact: codebase-mcp-macos-x86_64
            binary: codebase-mcp
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: codebase-mcp-macos-aarch64
            binary: codebase-mcp
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: codebase-mcp-windows-x86_64
            binary: codebase-mcp.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --locked --target ${{ matrix.target }}

      # Fix 1: Đặt extension vào matrix thay vì dùng env.ASSET động
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar czvf ${{ matrix.artifact }}.tar.gz \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.binary }} `
            -DestinationPath ${{ matrix.artifact }}.zip

      # Fix 1: Dùng glob trực tiếp thay vì env.ASSET
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Fix 2: Dùng $GITHUB_OUTPUT thay vì GITHUB_ENV cho multiline string
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          {
            echo "notes<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          # Fix 2: Tham chiếu qua steps.<id>.outputs thay vì env
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ---

            ## Installation

            Download the binary for your platform, then configure your MCP client:

            ### Claude Desktop
            ```json
            {
              "mcpServers": {
                "codebase-mcp": {
                  "command": "/path/to/codebase-mcp",
                  "args": []
                }
              }
            }
            ```
          files: artifacts/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
